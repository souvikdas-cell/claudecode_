
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1B1464;
  --blue:#2777F3;
  --blue-soft:#EAF2FF;
  --green:#45B644;
  --green-soft:#EEF8EE;
  --red:#FF5A5A;
  --red-soft:#FFF1F1;
  --neutral:#7A8398;
  --neutral-soft:#F7F8FB;
  --text:#0F0E16;
  --muted:#7A8193;
  --line:#E5EAF3;
  --shadow:0 10px 28px rgba(27,20,100,.08);
}
html,body{
  width:100%;
  min-height:100%;
  background:transparent;
  font-family:Onest,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:var(--text);
}
body{padding:0}

.widget{
  position:relative;
  width:100%;
  max-width:none;
  border-radius:20px;
  box-shadow:var(--shadow);
  overflow:hidden;
  isolation:isolate;
  background:#fff;
}
.widget::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  padding:1.4px;
  background:
    linear-gradient(110deg,
      rgba(215,219,228,.9) 0%,
      rgba(215,219,228,.9) 22%,
      rgba(168,174,186,1) 35%,
      rgba(245,247,251,1) 50%,
      rgba(168,174,186,1) 65%,
      rgba(215,219,228,.9) 78%,
      rgba(215,219,228,.9) 100%);
  background-size:260% 100%;
  animation:widgetBorderRun 3.8s linear infinite;
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  mask-composite:exclude;
  pointer-events:none;
  z-index:0;
}
.widget::after{
  content:"";
  position:absolute;
  inset:1px;
  border-radius:19px;
  background:#fff;
  z-index:0;
}
.inner{
  position:relative;
  z-index:1;
  padding:16px 16px 14px;
  border-radius:20px;
}

.header{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:10px;
  align-items:start;
}
.copy{min-width:0;padding-right:2px}
.title{
  font-size:17px;
  line-height:1.15;
  font-weight:700;
  letter-spacing:-.03em;
  color:var(--text);
  max-width:none;
}
.subtitle{
  margin-top:8px;
  font-size:12px;
  line-height:1.3;
  font-weight:500;
  color:var(--muted);
}
.expiryChip{
  margin-top:10px;
  display:inline-flex;
  align-items:center;
  gap:6px;
  height:26px;
  padding:0 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
  color:var(--blue);
  background:var(--blue-soft);
  border:1px solid rgba(39,119,243,.12);
  white-space:nowrap;
}
.expiryDot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 0 rgba(69,182,68,.35);
  animation:pulseDot 1.8s ease-out infinite;
}

.rightCol{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
  min-width:118px;
}

.switchWrap{
  position:relative;
  width:88px;
  height:26px;
  padding:3px;
  border-radius:999px;
  background:#F5F7FB;
  border:1px solid #E2E8F2;
  overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.72);
}
.switchTrack{
  position:absolute;
  inset:3px auto 3px 3px;
  width:39px;
  border-radius:999px;
  background:#FFFFFF;
  box-shadow:0 4px 10px rgba(27,20,100,.10),0 0 0 1px rgba(39,119,243,.06);
  transition:transform .24s ease;
  z-index:1;
}
.switchWrap.sensex .switchTrack{transform:translateX(43px)}
.switchRun{
  position:absolute;
  top:4px;
  left:-40px;
  width:34px;
  height:17px;
  border-radius:999px;
  background:linear-gradient(90deg,rgba(39,119,243,0) 0%,rgba(39,119,243,.12) 30%,rgba(39,119,243,.36) 50%,rgba(39,119,243,.12) 70%,rgba(39,119,243,0) 100%);
  animation:switchRun 2.5s linear infinite;
  z-index:0;
  pointer-events:none;
}
.switchBtns{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:1fr 1fr;
  height:100%;
}
.switchBtn{
  border:0;
  background:transparent;
  font:inherit;
  font-size:8.5px;
  font-weight:700;
  letter-spacing:.02em;
  color:#8C95AA;
  cursor:pointer;
}
.switchBtn.active{color:var(--navy)}


.queenArt{
  position:relative;
  width:122px;
  height:82px;
  margin-top:-5px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:visible;
}
.queenGlow{
  position:absolute;
  width:82px;
  height:82px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(39,119,243,.30) 0%,rgba(39,119,243,.15) 36%,rgba(39,119,243,.05) 58%,rgba(39,119,243,0) 76%);
  animation:queenGlowPulse 2.2s ease-in-out infinite;
}
.queenSvg{
  position:relative;
  z-index:1;
  width:82px;
  height:82px;
  color:var(--blue);
  fill:currentColor;
  filter:drop-shadow(0 7px 11px rgba(39,119,243,.18));
  animation:queenFloat 2.8s ease-in-out infinite;
}
.queenSvg *{
  vector-effect:non-scaling-stroke;
}
.ctaRow{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.ctaBtn{
  position:relative;
  height:42px;
  border-radius:12px;
  border:1.4px solid var(--line);
  background:#FFFFFF;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:0 10px;
  cursor:pointer;
  transition:transform .14s ease,box-shadow .16s ease,background .16s ease,border-color .16s ease;
  font:inherit;
  font-size:13px;
  font-weight:600;
  letter-spacing:-.01em;
  white-space:nowrap;
}
.ctaBtn:active{transform:scale(.985)}
.ctaBtn .label{position:relative;top:.2px}
.ctaBtn .icon{
  width:20px;
  height:16px;
  flex:0 0 20px;
  display:block;
  overflow:visible;
  animation:iconBreathe 1.9s ease-in-out infinite;
}
.icon .graph-axis{
  stroke:currentColor;
  stroke-width:1.15;
  opacity:.34;
  fill:none;
}
.icon .graph-line{
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:32;
  stroke-dashoffset:32;
  animation:graphDraw 2.1s ease-in-out infinite;
}
.icon .graph-dot{
  fill:currentColor;
  opacity:.45;
  animation:dotBlink 2.1s ease-in-out infinite;
}
.bearish{
  color:var(--red);
  border-color:rgba(255,90,90,.76);
  background:var(--red-soft);
}
.neutral{
  color:#8A8F9D;
  border-color:#A4AAB8;
  background:#FCFCFD;
}
.bullish{
  color:var(--green);
  border-color:rgba(69,182,68,.72);
  background:var(--green-soft);
}
.bearish .icon .graph-line,.bearish .icon .graph-dot{animation-delay:0s}
.neutral .icon .graph-line,.neutral .icon .graph-dot{animation-delay:.18s}
.bullish .icon .graph-line,.bullish .icon .graph-dot{animation-delay:.36s}
.bearish .icon{animation-delay:0s}
.neutral .icon{animation-delay:.14s}
.bullish .icon{animation-delay:.28s}
.ctaBtn:hover{box-shadow:0 10px 22px rgba(27,20,100,.06)}
.ctaBtn.active.bearish{box-shadow:0 8px 20px rgba(255,90,90,.10)}
.ctaBtn.active.neutral{box-shadow:0 8px 20px rgba(122,131,152,.10)}
.ctaBtn.active.bullish{box-shadow:0 8px 20px rgba(69,182,68,.10)}

@keyframes widgetBorderRun{
  0%{background-position:220% 0}
  100%{background-position:-20% 0}
}
@keyframes switchRun{
  0%{transform:translateX(0);opacity:.18}
  16%{opacity:.72}
  50%{opacity:.95}
  84%{opacity:.72}
  100%{transform:translateX(128px);opacity:.18}
}
@keyframes pulseDot{
  0%{box-shadow:0 0 0 0 rgba(69,182,68,.28)}
  75%{box-shadow:0 0 0 8px rgba(69,182,68,0)}
  100%{box-shadow:0 0 0 0 rgba(69,182,68,0)}
}
@keyframes graphDraw{
  0%{stroke-dashoffset:32;opacity:.22}
  32%{stroke-dashoffset:0;opacity:1}
  72%{stroke-dashoffset:0;opacity:1}
  100%{stroke-dashoffset:-32;opacity:.28}
}
@keyframes dotBlink{
  0%,100%{opacity:.20;transform:scale(.86)}
  38%,72%{opacity:1;transform:scale(1.16)}
}
@keyframes iconBreathe{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-1px)}
}
@keyframes queenFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-3px) scale(1.025)}
}
@keyframes queenGlowPulse{
  0%,100%{transform:scale(.92);opacity:.58}
  50%{transform:scale(1.12);opacity:1}
}

@media(max-width:380px){
  .inner{padding:14px 14px 12px}
  .title{font-size:16px;max-width:none}
  .rightCol{min-width:112px}
  .queenArt{width:116px;height:78px;margin-top:-6px}
  .queenGlow{width:78px;height:78px}
  .queenSvg{width:78px;height:78px}
  .ctaRow{gap:8px}
  .ctaBtn{font-size:12px;padding:0 8px}
  .switchWrap{width:84px;height:25px}
  .switchTrack{width:37px}
  .switchWrap.sensex .switchTrack{transform:translateX(41px)}
  .switchBtn{font-size:8px}
}
</style>
</head>

<script>
(function(){
  var activeSwitchIndex=0;
  var activePairKey='';
  var ctas=Array.prototype.slice.call(document.querySelectorAll('.ctaBtn'));
  var switchButtons=Array.prototype.slice.call(document.querySelectorAll('.switchBtn'));
  var switchWrap=document.getElementById('switchWrap');
  var expiryLabel=document.getElementById('expiryLabel');

  var pairs={
    INDEX:['NIFTY','SENSEX'],
    COMMODITY:['GOLD','CRUDE']
  };

  var config={
    NIFTY:{
      type:'index',
      shortLabel:'NIFTY',
      switchLabel:'NIFTY',
      token:'Nifty 50',
      rolloverHour:15,
      rolloverMinute:30,
      expiries:[
        {date:'2026-04-28',label:'28 Apr'},
        {date:'2026-05-05',label:'5 May'},
        {date:'2026-05-12',label:'12 May'},
        {date:'2026-05-19',label:'19 May'},
        {date:'2026-05-26',label:'26 May'},
        {date:'2026-06-02',label:'2 Jun'},
        {date:'2026-06-09',label:'9 Jun'},
        {date:'2026-06-16',label:'16 Jun'},
        {date:'2026-06-23',label:'23 Jun'},
        {date:'2026-06-30',label:'30 Jun'}
      ]
    },
    SENSEX:{
      type:'index',
      shortLabel:'SENSEX',
      switchLabel:'SENSEX',
      token:'SENSEX',
      rolloverHour:15,
      rolloverMinute:30,
      expiries:[
        {date:'2026-04-30',label:'30 Apr'},
        {date:'2026-05-07',label:'7 May'},
        {date:'2026-05-14',label:'14 May'},
        {date:'2026-05-21',label:'21 May'},
        {date:'2026-05-27',label:'27 May'},
        {date:'2026-06-04',label:'4 Jun'},
        {date:'2026-06-11',label:'11 Jun'},
        {date:'2026-06-18',label:'18 Jun'},
        {date:'2026-06-25',label:'25 Jun'}
      ]
    },
    GOLD:{
      type:'commodity',
      shortLabel:'GOLD',
      switchLabel:'GOLD',
      rolloverHour:23,
      rolloverMinute:45,
      expiries:[
        {date:'2026-05-29',label:'29 May',token:'GOLDM26JUNFUT-MCX'},
        {date:'2026-06-26',label:'26 Jun',token:'GOLDM26JULFUT-MCX'},
        {date:'2026-07-29',label:'29 Jul',token:'GOLDM26AUGFUT-MCX'}
      ]
    },
    CRUDE:{
      type:'commodity',
      shortLabel:'CRUDE',
      switchLabel:'CRUDE',
      rolloverHour:23,
      rolloverMinute:45,
      expiries:[
        {date:'2026-05-14',label:'14 May',token:'CRUDEOILM26MAYFUT-MCX'},
        {date:'2026-06-16',label:'16 Jun',token:'CRUDEOILM26JUNFUT-MCX'},
        {date:'2026-07-16',label:'16 Jul',token:'CRUDEOILM26JULFUT-MCX'}
      ]
    }
  };

  function getIstDate(){
    return new Date(Date.now()+330*60000);
  }

  function getIstWallClockMs(){
    return Date.now()+330*60000;
  }

  function getActivePairKey(){
    var ist=getIstDate();
    var minutes=ist.getUTCHours()*60+ist.getUTCMinutes();

    if(minutes>=930 && minutes<1410){
      return 'COMMODITY';
    }

    return 'INDEX';
  }

  function getCutoffMs(dateString,hour,minute){
    var parts=dateString.split('-');
    return Date.UTC(Number(parts[0]),Number(parts[1])-1,Number(parts[2]),hour,minute,0);
  }

  function getActiveExpiry(instrument){
    var item=config[instrument];
    var list=item.expiries;
    var nowIstMs=getIstWallClockMs();

    for(var i=0;i<list.length;i++){
      if(nowIstMs<=getCutoffMs(list[i].date,item.rolloverHour,item.rolloverMinute)){
        return list[i];
      }
    }

    return list[list.length-1];
  }

  function buildUrl(instrument,strategyKey){
    var item=config[instrument];
    var expiry=getActiveExpiry(instrument);
    var token=expiry.token||item.token;
    var widgetPayload;

    if(item.type==='commodity'){
      widgetPayload='name:strategy-builder,underlyingInternalToken:'+token+',selectedStrategyKey:'+strategyKey+',expiry:'+expiry.date;
    }else{
      widgetPayload='name:strategy-builder,underlyingInternalToken:'+token+',expiry:'+expiry.date+',selectedStrategyKey:'+strategyKey;
    }

    return 'https://finx.choiceindia.com/?productType=strikex&widgets='+encodeURIComponent(widgetPayload);
  }

  function buildActionId(instrument,strategyKey,expiryDate){
    var strategyMap={
      bear_put_spread:'bearish',
      short_straddle:'neutral',
      bull_call_spread:'bullish'
    };
    var expirySlug=(expiryDate||'').replace(/-/g,'_');

    return 'strikex_widget_'+instrument.toLowerCase()+'_'+(strategyMap[strategyKey]||strategyKey)+'_'+expirySlug+'_open';
  }

  function setActiveCta(target){
    ctas.forEach(function(item){item.classList.remove('active');});
    target.classList.add('active');
  }

  function renderSwitch(pairKey,instrument){
    var pair=pairs[pairKey];

    switchButtons.forEach(function(btn,index){
      var switchInstrument=pair[index];
      var active=switchInstrument===instrument;

      btn.textContent=config[switchInstrument].switchLabel;
      btn.setAttribute('data-underlying',switchInstrument);
      btn.classList.toggle('active',active);
      btn.setAttribute('aria-selected',active?'true':'false');
    });

    if(activeSwitchIndex===1){switchWrap.classList.add('sensex');}
    else{switchWrap.classList.remove('sensex');}
  }

  function renderInstrument(instrument){
    var expiry=getActiveExpiry(instrument);

    expiryLabel.textContent=config[instrument].shortLabel+' • '+expiry.label+' Expiry';

    ctas.forEach(function(btn){
      var strategyKey=btn.getAttribute('data-strategy')||'';

      btn.setAttribute('data-url',buildUrl(instrument,strategyKey));
      btn.setAttribute('data-action-id',buildActionId(instrument,strategyKey,expiry.date));
      btn.setAttribute('data-expiry',expiry.date);
      btn.setAttribute('data-instrument',instrument);
    });
  }

  function syncActivePair(forceReset){
    var pairKey=getActivePairKey();
    var pair=pairs[pairKey];

    if(pairKey!==activePairKey || forceReset){
      activePairKey=pairKey;
      activeSwitchIndex=0;
    }

    var instrument=pair[activeSwitchIndex]||pair[0];

    renderSwitch(pairKey,instrument);
    renderInstrument(instrument);
  }

  var redirectLocked=false;

  function redirectOnPlotline(actionId,url){
    if(!url || redirectLocked){return;}
    redirectLocked=true;

    try{
      if(window.PlotlineWeb&&typeof window.PlotlineWeb.onClick==='function'){
        window.PlotlineWeb.onClick(actionId,'REDIRECT',url,'WEB',false,false,false);
      }
    }catch(e){
      redirectLocked=false;
    }
  }

  switchButtons.forEach(function(btn,index){
    btn.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();

      activeSwitchIndex=index;
      syncActivePair(false);
    });
  });

  ctas.forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();

      setActiveCta(btn);
      redirectOnPlotline(btn.getAttribute('data-action-id')||'',btn.getAttribute('data-url')||'');
    });

    btn.addEventListener('mouseenter',function(){setActiveCta(btn);});
    btn.addEventListener('focus',function(){setActiveCta(btn);});
  });

  syncActivePair(true);
  window.setInterval(function(){syncActivePair(false);},60000);
})();
</script>
